<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Use JetBrainsMono Nerd Font Mono as default monospace -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrainsMono Nerd Font Mono</family>
    </prefer>
  </alias>

  <!-- Fallback: append Symbols Nerd Font Mono for icon glyphs -->
  <alias>
    <family>JetBrainsMono Nerd Font Mono</family>
    <accept>
      <family>Symbols Nerd Font Mono</family>
    </accept>
  </alias>
</fontconfig>
