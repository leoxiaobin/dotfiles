<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Use BlexMono Nerd Font Mono (IBM Plex Mono patched with Nerd Font glyphs) as default monospace -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>BlexMono Nerd Font Mono</family>
    </prefer>
  </alias>

  <!-- Fallback: append Symbols Nerd Font Mono for icon glyphs -->
  <alias>
    <family>BlexMono Nerd Font Mono</family>
    <accept>
      <family>Symbols Nerd Font Mono</family>
    </accept>
  </alias>
</fontconfig>
